<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12161e"/>
      <stop offset="100%" stop-color="#090b10"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3b261"/>
      <stop offset="100%" stop-color="#e8a33d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle inner border -->
  <rect x="4" y="4" width="504" height="504" rx="104" fill="none" stroke="rgba(232,163,61,0.15)" stroke-width="4"/>
  <!-- Glow circle behind text -->
  <circle cx="256" cy="256" r="120" fill="rgba(232,163,61,0.08)"/>
  <!-- </> code symbol -->
  <text x="256" y="290" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-weight="700" font-size="200" fill="url(#amber)" filter="url(#glow)">&lt;/&gt;</text>
</svg>
